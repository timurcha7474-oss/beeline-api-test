name: API Tests

on:
  push:
    branches:
      - master

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать проект
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Установить зависимости
        run: |
          pip install -r requirements.txt

      - name: Запустить API тесты
        run: |
          pytest